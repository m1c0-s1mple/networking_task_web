name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd /home/ec2-user/networking_task_web

            git pull origin main

            sudo docker stop networking-app || true
            sudo docker rm networking-app || true

            sudo docker build -t networking-app .

            sudo docker run -d \
              --name networking-app \
              -p 80:3000 \
              --restart unless-stopped \
              networking-app
